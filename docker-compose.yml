services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CORS_ALLOW_ORIGINS=http://localhost:5173,http://localhost:8080
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      - neo4j

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend

  neo4j:
    image: neo4j:5.25
    ports:
      - "7474:7474"
      - "7687:7687"
    env_file:
      - .env
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
