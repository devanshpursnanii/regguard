<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: Arial, sans-serif; font-size: 12px; color: #0f172a; }
      h1 { font-size: 20px; margin-bottom: 8px; }
      .meta { margin-bottom: 16px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border: 1px solid #e2e8f0; padding: 6px; text-align: left; }
      th { background: #f8fafc; }
    </style>
  </head>
  <body>
    <h1>RegGuard Compliance Report</h1>
    <div class="meta">
      <div><strong>Company:</strong> {company_name}</div>
      <div><strong>Overall Score:</strong> {overall_score}</div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Clause</th>
          <th>Section</th>
          <th>Status</th>
          <th>Confidence</th>
          <th>Citations</th>
        </tr>
      </thead>
      <tbody>
        {rows}
      </tbody>
    </table>
  </body>
</html>
